<!DOCTYPE html>
<html>
<head>
    <title>To-Do App</title>
    <style>
        body{
            font-family: Arial;
            background:#f4f4f4;
            text-align:center;
            margin-top:50px;
        }

        .container{
            background:white;
            width:80%;
            margin:auto;
            padding:20px;
            border-radius:10px;
            box-shadow:0px 0px 10px gray;
        }

        input{
            padding:10px;
            width:70%;
        }

        button{
            padding:10px;
            margin-left:5px;
            cursor:pointer;
        }

        li{
            list-style:none;
            padding:10px;
            background:#eee;
            margin:5px;
            display:flex;
            justify-content:space-between;
        }
    </style>
</head>

<body>

<div class="container">

    <h1>My To-Do App</h1>

    <input type="text" id="task" placeholder="Enter task">
    <button onclick="addTask()">Add</button>

    <ul id="list"></ul>

</div>

<script>
function addTask(){
    let task = document.getElementById("task").value;

    if(task === ""){
        alert("Please enter a task");
        return;
    }

    let li = document.createElement("li");
    li.innerHTML = task + " <button onclick='this.parentElement.remove()'>X</button>";

    document.getElementById("list").appendChild(li);

    document.getElementById("task").value = "";
}
</script>

</body>
</html>
